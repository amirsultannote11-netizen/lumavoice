<!DOCTYPE html>
<html>
<head>
    <title>Loma Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        .box { border: 2px solid #0f0; padding: 20px; margin: 20px; border-radius: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 15px; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Loma Universal Terminal</h3>
        <button onclick="scan()">بلوٹوتھ تلاش کریں</button>
        <p id="stat">اسٹیٹس: ڈس کنیکٹڈ</p>
    </div>
    <div id="log" style="text-align: left; padding: 10px; font-size: 12px;"></div>

    <script>
        async function scan() {
            try {
                // یہ لائن ہر بلوٹوتھ ڈیوائس کو دکھائے گی
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                
                document.getElementById('stat').innerText = "کنکٹ ہو رہا ہے: " + device.name;
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    let val = new TextDecoder().decode(e.target.value).trim();
                    document.getElementById('log').innerHTML += "> سگنل ملا: " + val + "<br>";
                    if(val === "OPEN_GEMINI") {
                         window.location.href = "intent://com.google.android.googlequicksearchbox/#Intent;scheme=googleapp;action=android.intent.action.VOICE_ASSISTANT;end";
                    }
                });
                document.getElementById('stat').innerText = "کنیکٹڈ ✅";
            } catch (e) {
                alert("Error: " + e);
            }
        }
    </script>
</body>
</html>
