<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>Loma Control Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 50px; }
        .circle { width: 150px; height: 150px; border-radius: 50%; background: #00d2ff; margin: 0 auto; box-shadow: 0 0 30px #00d2ff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #status { margin-top: 20px; color: #00ff00; }
        #log { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="circle" onclick="connectBluetooth()">لوما کنکٹ کریں</div>
    <div id="status">اسٹیٹس: ڈس کنیکٹڈ</div>
    <div id="log">انتظار فرمائیں...</div>

    <script>
        let bluetoothDevice;
        let characteristic;

        async function connectBluetooth() {
            try {
                document.getElementById('log').innerText = "ڈیوائس تلاش کی جا رہی ہے...";
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });

                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                characteristic = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');

                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleData);

                document.getElementById('status').innerText = "اسٹیٹس: جڑا ہوا ہے (" + bluetoothDevice.name + ")";
                document.getElementById('log').innerText = "کمانڈ وصول کرنے کے لیے تیار!";

            } catch (error) {
                document.getElementById('log').innerText = "خرابی: " + error;
            }
        }

        function handleData(event) {
            let value = new TextDecoder().decode(event.target.value).trim();
            document.getElementById('log').innerText = "موصولہ ڈیٹا: " + value;

            if (value === "OPEN_GEMINI") {
                // طریقہ 1: گوگل اسسٹنٹ ڈائریکٹ لنک
                window.location.href = "googleassistant://";
                
                // طریقہ 2: اگر 1 کام نہ کرے تو 1 سیکنڈ بعد یہ کوشش کرے (گوگل وائس سرچ)
                setTimeout(() => {
                    window.location.href = "googleapp://utils/voice-search";
                }, 1000);

                // طریقہ 3: اینڈرائیڈ انٹنٹ (بہت طاقتور طریقہ)
                setTimeout(() => {
                    window.location.href = "intent://#Intent;scheme=googleapp;package=com.google.android.googlequicksearchbox;action=android.intent.action.VOICE_ASSISTANT;end";
                }, 2000);
            }
        }
    </script>
</body>
</html>
