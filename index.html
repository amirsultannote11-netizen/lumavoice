<!DOCTYPE html>
<html>
<head>
    <title>Loma AI Voice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-connect { background: #007bff; color: white; border: none; padding: 20px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #log { margin-top: 20px; color: #00ff00; font-family: monospace; font-size: 14px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Loma Control Panel</h2>
        <p id="status" style="color: #ff9800;">Status: Ready to Connect</p>
        <button class="btn-connect" onclick="startSystem()">Connect to Loma</button>
        <div id="log"></div>
    </div>

    <script>
        async function startSystem() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['4fafc201-1fb5-459e-8fcc-c5c9c331914b']
                });
                
                const server = await device.gatt.connect();
                document.getElementById('status').innerText = "Connected: " + device.name;
                document.getElementById('status').style.color = "#4caf50";

                const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
                const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
                
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    let val = new TextDecoder().decode(e.target.value).trim();
                    document.getElementById('log').innerHTML += "> Recieved: " + val + "<br>";
                    
                    if(val === "OPEN_GEMINI") {
                        // یہ کمانڈ ایپ کے اندر سے گوگل اسسٹنٹ کو کھولے گی
                        window.location.href = "googleassistant://";
                    }
                });
            } catch (e) {
                alert("Error: " + e);
            }
        }
    </script>
</body>
</html>
